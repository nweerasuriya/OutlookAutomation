# .github/workflows/email_automation.yml
# Runs the Phase 1 email outreach workflow on a daily schedule.
# Scheduled for 9 AM MST = 16:00 UTC (accounts for MST = UTC-7).
# Can also be triggered manually via the Actions tab.

name: Email Outreach Automation

on:
  schedule:
    - cron: "0 16 * * 1-5"   # 9 AM MST, Monday–Friday
  workflow_dispatch:           # Manual trigger for testing
    inputs:
      dry_run:
        description: "Dry run (skips actual sends)"
        required: false
        default: "false"

jobs:
  send-emails:
    name: Send Outreach Emails
    runs-on: ubuntu-latest
    timeout-minutes: 480      # 8-hour cap (25 emails × 5 min + buffer)

    env:
      # ── Azure / Graph API ─────────────────────────────────────────────────
      AZURE_TENANT_ID:        ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:        ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:    ${{ secrets.AZURE_CLIENT_SECRET }}

      # ── OneDrive ──────────────────────────────────────────────────────────
      ONEDRIVE_USER_ID:       ${{ secrets.ONEDRIVE_USER_ID }}
      ONEDRIVE_REMOTE_BASE:   ${{ secrets.ONEDRIVE_REMOTE_BASE }}

      # ── Email Config ──────────────────────────────────────────────────────
      SENDER_EMAIL:           ${{ secrets.SENDER_EMAIL }}
      EMAIL_SUBJECT:          ${{ secrets.EMAIL_SUBJECT }}
      CSV_FILENAME:           ${{ secrets.CSV_FILENAME }}
      TEMPLATE_FILENAME:      ${{ secrets.TEMPLATE_FILENAME }}

      # ── Send Settings ─────────────────────────────────────────────────────
      DAILY_LIMIT:            "25"
      INTERVAL_SECONDS:       "300"
      LOG_DIR:                "logs"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automated tests
        run: pytest tests/ -v --tb=short
        
      - name: Debug token acquisition
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python - <<'EOF'
          import os, msal, json
      
          tenant_id     = os.environ["AZURE_TENANT_ID"]
          client_id     = os.environ["AZURE_CLIENT_ID"]
          client_secret = os.environ["AZURE_CLIENT_SECRET"]
      
          print(f"Tenant ID length:  {len(tenant_id)}")
          print(f"Client ID length:  {len(client_id)}")
          print(f"Secret length:     {len(client_secret)}")
          print(f"Tenant ID format valid: {len(tenant_id.strip()) == 36}")
          print(f"Client ID format valid: {len(client_id.strip()) == 36}")
      
          app = msal.ConfidentialClientApplication(
              client_id,
              authority=f"https://login.microsoftonline.com/{tenant_id}",
              client_credential=client_secret,
          )
          result = app.acquire_token_for_client(
              scopes=["https://graph.microsoft.com/.default"]
          )
      
          if "access_token" in result:
              print("SUCCESS — token acquired")
              print(f"Token length: {len(result['access_token'])}")
          else:
              print("FAILED — full error response:")
              print(json.dumps(result, indent=2))
          EOF

      - name: Run email workflow
        if: github.event.inputs.dry_run != 'true'
        run: python src/main.py

      - name: Dry run notice
        if: github.event.inputs.dry_run == 'true'
        run: echo "DRY RUN — email sends skipped."

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
