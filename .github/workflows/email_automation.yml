# .github/workflows/email_automation.yml  —  Phase 2
# Runs all configured lists in a single daily job.
# 9 AM MST = 16:00 UTC (MST = UTC-7, no daylight saving).
#
# TIMEOUT NOTE
# With multiple lists the job can run for many hours.
# Rough formula: (daily_limit × interval_seconds) per list, summed.
# Example: 2 lists × 25 emails × 300s = ~250 min. Adjust timeout-minutes below.

name: Email Outreach Automation — Phase 2

on:
  schedule:
    - cron: "0 16 * * 1-5"    # 9 AM MST, Monday–Friday
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — skip actual sends (tests still run)"
        required: false
        default: "false"
      list_filter:
        description: "Run only this list_id (leave blank for all)"
        required: false
        default: ""

jobs:
  send-emails:
    name: Send Outreach Emails (all lists)
    runs-on: ubuntu-latest
    timeout-minutes: 720      # 12 hours — adjust based on your total send volume

    env:
      # ── Azure / Graph API — shared across all lists ───────────────────────
      AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}

      # ── OneDrive ─────────────────────────────────────────────────────────
      ONEDRIVE_USER_ID:     ${{ secrets.ONEDRIVE_USER_ID }}
      ONEDRIVE_REMOTE_BASE: ${{ secrets.ONEDRIVE_REMOTE_BASE }}

      # ── Multi-list config (JSON array stored as a single secret) ──────────
      LISTS_CONFIG:         ${{ secrets.LISTS_CONFIG }}

      # ── Optional overrides ────────────────────────────────────────────────
      LOG_DIR:              "logs"
      LIST_FILTER:          ${{ github.event.inputs.list_filter }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automated tests
        run: pytest tests/ -v --tb=short

      - name: Run email workflow
        if: github.event.inputs.dry_run != 'true'
        run: python src/main.py

      - name: Dry run notice
        if: github.event.inputs.dry_run == 'true'
        run: echo "DRY RUN — email sends skipped. Tests passed."

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
